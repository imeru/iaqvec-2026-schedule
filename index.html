<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="학회 스케줄 계획 및 동선 도구">
<title>Conference Schedule Planner</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #1f1f1f; background: #fafafa; font-size: 14px;
  }
  header {
    background: #1f1f1f; color: #fff; padding: 12px 20px;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .stats { font-size: 12px; opacity: 0.7; }
  header .conf-chip {
    background: rgba(255,255,255,0.12); padding: 4px 10px; border-radius: 14px;
    font-size: 12px; display: flex; align-items: center; gap: 8px;
  }
  header .conf-name { font-weight: 600; cursor: pointer; }
  header .conf-name:hover { text-decoration: underline; }
  header .conf-edit {
    background: transparent; border: none; color: #fff; cursor: pointer; font-size: 11px;
    opacity: 0.7; padding: 0; line-height: 1;
  }
  header .conf-edit:hover { opacity: 1; }
  header .conf-rename-input {
    background: #fff; color: #1f1f1f; border: none; padding: 2px 6px; border-radius: 3px;
    font-size: 12px; font-weight: 600; width: 220px;
  }
  header .conf-chip select {
    background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px; padding: 2px 4px; font-size: 11px;
  }
  header .conf-chip select option { color: #1f1f1f; }
  header .actions { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  header button {
    background: #fff; color: #1f1f1f; border: none; padding: 6px 12px;
    border-radius: 4px; font-size: 12px; cursor: pointer;
  }
  header button:hover { background: #ddd; }

  /* Mobile: compact header, full-width actions row, larger tap targets */
  @media (max-width: 720px) {
    header { padding: 10px 12px; gap: 8px; align-items: center; }
    header h1 { font-size: 14px; flex: 1 1 100%; }
    header .stats { flex: 1 1 100%; order: 4; font-size: 11px; }
    header .conf-chip { flex: 1 1 100%; justify-content: space-between; }
    header .conf-rename-input { width: 100%; font-size: 14px; }
    header .actions { margin-left: 0; width: 100%; }
    header button { flex: 1 1 auto; min-width: 0; font-size: 11px; padding: 8px 6px; }
  }

  /* Two-column layout: filters | main (with tabs inside) */
  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; padding: 16px; align-items: start; }

  /* Mobile: single column */
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; gap: 12px; padding: 10px; }
    .panel { padding: 12px; }
    .session { padding: 10px; }
  }

  /* View tabs */
  .view-tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #e3e3e3; }
  .view-tab {
    background: transparent; border: none; padding: 8px 14px; cursor: pointer;
    font-size: 13px; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .view-tab:hover { color: #1f1f1f; }
  .view-tab.active { color: #1f1f1f; font-weight: 600; border-bottom-color: #1f1f1f; }
  .view-tab .badge {
    display: inline-block; background: #4a90e2; color: #fff; border-radius: 10px;
    padding: 0 6px; font-size: 10px; font-weight: 600; margin-left: 4px; min-width: 16px;
    text-align: center;
  }
  .view-tab .badge:empty,
  .view-tab .badge[data-count="0"] { display: none; }

  /* Room columns inside an itinerary slot */
  .slot .rooms {
    display: grid; gap: 8px; margin-top: 6px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }
  .slot .room-col {
    background: #fff; border: 1px solid #e6e6e6; border-radius: 4px; padding: 8px;
  }
  .slot .room-head {
    font-weight: 600; font-size: 11px; margin-bottom: 4px; color: #1f1f1f;
    display: flex; justify-content: space-between; align-items: center;
  }
  .slot.multi-room { background: #fffaf0; border-left-color: #f5a623; }
  .slot.multi-room .info { color: #b8860b; font-size: 11px; font-weight: 600; margin-top: 4px; }

  .panel { background: #fff; border: 1px solid #e3e3e3; border-radius: 6px; padding: 14px; }
  .panel h2 { margin: 0 0 10px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; }

  /* Filters */
  .filter-group { margin-bottom: 14px; }
  .filter-group label { display: block; font-size: 12px; margin: 4px 0; cursor: pointer; }
  .filter-group input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .filter-head { display: flex; justify-content: space-between; align-items: center; margin: 4px 0 6px; }
  .filter-head label { font-weight: 600; font-size: 11px; color: #444; margin: 0; }
  .filter-toggles { font-size: 11px; }
  .filter-toggles a { color: #4a90e2; text-decoration: none; }
  .filter-toggles a:hover { text-decoration: underline; }
  .day-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .day-select {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 13px; background: #fff; cursor: pointer;
  }
  .day-tabs button {
    flex: 1 1 0; min-width: 0; padding: 4px 2px; border: 1px solid #ccc; background: #fff;
    cursor: pointer; border-radius: 4px; font-size: 11px; line-height: 1.25;
  }
  .day-tabs button .d-main { display: block; font-weight: 600; }
  .day-tabs button .d-sub  { display: block; font-size: 10px; color: #888; }
  .day-tabs button.active { background: #1f1f1f; color: #fff; border-color: #1f1f1f; }
  .day-tabs button.active .d-sub { color: #ccc; }

  /* Sessions */
  .session {
    margin-bottom: 14px; padding: 10px 12px; border: 1px solid #e6e6e6; border-radius: 6px; background: #fff;
  }
  .session-header {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    padding-bottom: 6px; border-bottom: 1px dashed #eee; margin-bottom: 8px;
  }
  .session-id { font-weight: 600; color: #555; font-size: 12px; }
  .session-title { font-weight: 600; }
  .session-meta { font-size: 11px; color: #888; }
  .building-tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;
    margin-left: 4px;
  }
  .tag-SGM { background: #e7f1ff; color: #1d4e89; }
  .tag-GFS { background: #fff1e0; color: #8a4b00; }
  .tag-VHE { background: #efe7ff; color: #553f8a; }

  .paper { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; align-items: flex-start; }
  .paper:last-child { border-bottom: none; }
  .paper input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }
  .paper-body { flex: 1; }
  .paper-title { font-size: 13px; line-height: 1.4; }
  .paper-authors { font-size: 11px; color: #666; margin-top: 2px; }
  .paper-no { font-size: 10px; color: #999; font-family: monospace; }

  /* Right panel: itinerary */
  /* (Itinerary is now a tab inside .main, not a sticky side panel.) */
  .day-block { margin-bottom: 16px; }
  .day-block h3 { font-size: 12px; margin: 0 0 8px 0; color: #1f1f1f; }
  .slot {
    padding: 8px 10px; margin-bottom: 6px; border-left: 3px solid #4a90e2; background: #f7faff; border-radius: 0 4px 4px 0;
    font-size: 12px;
  }
  .slot.conflict { border-left-color: #d0021b; background: #fff5f5; }
  .slot .time { font-weight: 600; }
  .slot .pick { margin-top: 4px; padding-left: 8px; }
  .slot .pick .ptitle { font-size: 12px; }
  .slot .pick .pauthors { font-size: 11px; color: #555; margin-top: 2px; font-style: italic; }
  .slot .pick .pmeta { font-size: 10px; color: #888; margin-top: 2px; }
  .warn { color: #d0021b; font-weight: 600; font-size: 11px; margin-top: 4px; }
  .walk { font-size: 10px; color: #888; padding: 4px 12px; }
  .walk.tight { color: #d0021b; font-weight: 600; }

  .empty { color: #999; font-size: 12px; font-style: italic; }

  .toggle-collapse { background: none; border: none; cursor: pointer; font-size: 11px; color: #4a90e2; padding: 2px 6px; }
  .session.collapsed .paper-list { display: none; }

  .hidden { display: none !important; }

  mark { background: #fff59d; color: inherit; padding: 0 1px; border-radius: 2px; }

  /* Rating + notes */
  .rating { display: inline-flex; gap: 1px; margin-top: 4px; }
  .rating .star {
    cursor: pointer; font-size: 16px; line-height: 1; color: #d0d0d0;
    user-select: none; transition: color 0.1s;
  }
  .rating .star.on { color: #f5a623; }
  .rating .star:hover { color: #f5a623; }
  .note-input {
    width: 100%; margin-top: 4px; padding: 4px 6px; font-size: 11px;
    border: 1px solid #ddd; border-radius: 3px; resize: vertical;
    min-height: 22px; font-family: inherit;
  }
  .note-input:focus { outline: none; border-color: #4a90e2; }
  .note-indicator {
    display: inline-block; margin-left: 4px; font-size: 10px; color: #f5a623;
  }

  /* Share modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
    padding: 16px;
  }
  .modal {
    background: #fff; border-radius: 8px; max-width: 480px; width: 100%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .modal-head {
    padding: 14px 18px; border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-close {
    background: transparent; border: none; cursor: pointer; font-size: 18px; color: #888;
  }
  .modal-body { padding: 16px 18px; }
  .modal-note { font-size: 13px; color: #444; margin: 0 0 12px; line-height: 1.5; }
  .modal-hint { font-size: 11px; color: #888; margin: 10px 0 0; line-height: 1.5; }
  .share-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .share-row input {
    flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 12px; font-family: monospace; min-width: 0;
  }
  .share-row button {
    background: #1f1f1f; color: #fff; border: none; padding: 0 14px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .share-qr {
    display: flex; justify-content: center; padding: 8px; background: #fafafa;
    border-radius: 4px; min-height: 220px; align-items: center;
  }
  .share-qr img { width: 220px; height: 220px; }
  .share-qr .err { font-size: 11px; color: #888; text-align: center; }

  /* Mobile: bigger tap targets and font-size ≥16px on inputs to prevent iOS auto-zoom */
  @media (max-width: 720px) {
    body { font-size: 15px; }
    .paper { padding: 10px 0; }
    .paper input[type="checkbox"] { transform: scale(1.4); margin-top: 6px; margin-left: 4px; margin-right: 4px; }
    .paper-title { font-size: 14px; }
    .paper-authors { font-size: 12px; }
    .filter-group input[type="text"] { font-size: 16px; padding: 8px 10px; }
    .filter-group label { padding: 6px 0; font-size: 13px; }
    .rating .star { font-size: 22px; padding: 2px 3px; }
    .note-input { font-size: 16px; padding: 8px; }
    .slot { padding: 10px; }
    .slot .pick .ptitle { font-size: 13px; }
    .slot .pick .pauthors { font-size: 12px; }
  }
</style>
</head>

<header>
  <h1>📅 Conference Schedule Planner</h1>
  <div class="conf-chip" id="conf-chip" title="현재 학회 (학회명 클릭하여 수정)">
    <span class="conf-name" id="conf-name" title="클릭하여 학회명 수정"></span>
    <button class="conf-edit" id="conf-edit" title="학회명 수정">✏️</button>
    <select id="conf-switch" title="이전에 사용한 학회로 전환"></select>
  </div>
  <div class="stats" id="stats"></div>
  <div class="actions">
    <button id="btn-clear">선택 초기화</button>
    <button id="btn-share">🔗 공유 링크</button>
    <button id="btn-export-state">💾 내 데이터 내보내기</button>
    <button id="btn-load-json">📂 불러오기</button>
    <button id="btn-export-ics">📅 ICS</button>
    <button id="btn-export-csv">📊 CSV</button>
    <input type="file" id="file-json" accept=".json" style="display:none">
  </div>
</header>

<!-- Share-link modal -->
<div class="modal-bg" id="share-modal" style="display:none;">
  <div class="modal">
    <div class="modal-head">
      <strong>내 일정 공유 링크</strong>
      <button class="modal-close" id="share-close">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-note">
        이 링크에는 본인의 <strong>선택한 발표와 별점</strong>이 포함됩니다.
        메모는 포함되지 않습니다 (메모까지 옮기시려면 <em>내 데이터 내보내기</em>를 이용하세요).
      </p>
      <div class="share-row">
        <input type="text" id="share-url" readonly>
        <button id="share-copy">복사</button>
      </div>
      <div id="share-qr" class="share-qr"></div>
      <p class="modal-hint">폰으로 QR을 스캔하거나 URL을 카톡으로 본인에게 전송해 열면 자동으로 적용됩니다.</p>
    </div>
  </div>
</div>

<div class="layout">

  <!-- LEFT: filters -->
  <div class="panel">
    <h2>필터</h2>
    <div class="filter-group">
      <input type="text" id="search" placeholder="🔍 제목·저자·키워드 검색">
    </div>
    <div class="filter-group">
      <div class="day-tabs" id="day-tabs"></div>
    </div>
    <div class="filter-group">
      <div class="filter-head">
        <label>트랙</label>
        <span class="filter-toggles">
          <a href="#" data-act="all"  data-target="tracks">전체</a> ·
          <a href="#" data-act="none" data-target="tracks">해제</a>
        </span>
      </div>
      <div id="track-filter"></div>
    </div>
    <div class="filter-group">
      <div class="filter-head">
        <label>건물</label>
        <span class="filter-toggles">
          <a href="#" data-act="all"  data-target="buildings">전체</a> ·
          <a href="#" data-act="none" data-target="buildings">해제</a>
        </span>
      </div>
      <div id="building-filter"></div>
    </div>
  </div>

  <!-- MAIN: tabbed (둘러보기 | 내 일정) -->
  <div class="main">
    <div class="view-tabs" id="view-tabs">
      <button class="view-tab" data-view="browse">📋 둘러보기</button>
      <button class="view-tab" data-view="itinerary">📅 내 일정 <span class="badge" id="view-badge">0</span></button>
    </div>

    <div id="view-browse">
      <div id="session-list"></div>
    </div>

    <div id="view-itinerary" class="panel" style="display:none;">
      <div id="itinerary"></div>
    </div>
  </div>

</div>

// ====== Walking time matrix (minutes), simple building/floor model ======
// Conventions:
//   sameRoom: 0 ; sameFloor: 2 ; sameBuildingDiffFloor: 4 ; SGM<->GFS: 7 ;
//   VHE: 10 (different building / online courtyard)
function walkMinutes(a, b) {
  if (!a || !b) return 0;
  if (a.building === b.building && a.room === b.room) return 0;
  if (a.building === b.building && a.floor === b.floor) return 2;
  if (a.building === b.building) return 4;
  const set = [a.building, b.building].sort().join('-');
  if (set === 'GFS-SGM') return 7;
  if (a.building === 'VHE' || b.building === 'VHE') return 10;
  return 8;
}

// ====== Per-conference storage ======
// Keys are namespaced as "cs:<confId>:<field>". Conference identity comes from
// DATA.conference (preferred) or a deterministic content hash if older JSON
// without that metadata is loaded.

function contentHash(d) {
  const s = d.sessions || [];
  const seed = `${s.length}|${(s[0]||{}).date||''}|${(s[0]||{}).id||''}|${(s.at(-1)||{}).date||''}|${(s.at(-1)||{}).id||''}`;
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  return 'auto-' + (h >>> 0).toString(16);
}
function confIdFor(d)   { return (d.conference && d.conference.id)   || contentHash(d); }

// User-edited display names live in cs:names. They override DATA.conference.name
// so renaming doesn't require re-running the parser or touching the JSON.
function loadNameOverrides() { return JSON.parse(localStorage.getItem('cs:names') || '{}'); }
function saveNameOverride(id, name) {
  const o = loadNameOverrides();
  if (name) o[id] = name; else delete o[id];
  localStorage.setItem('cs:names', JSON.stringify(o));
  // Keep the registry in sync so the dropdown shows the new label too.
  const reg = JSON.parse(localStorage.getItem('cs:registry') || '{}');
  if (reg[id]) { reg[id].name = name || reg[id].name; localStorage.setItem('cs:registry', JSON.stringify(reg)); }
}
function confNameFor(d) {
  const id = confIdFor(d);
  const o = loadNameOverrides();
  return o[id] || (d.conference && d.conference.name) || 'Untitled conference';
}

let currentConfId = confIdFor(DATA);
const kSelected = () => `cs:${currentConfId}:selected`;
const kNotes    = () => `cs:${currentConfId}:notes`;

// Registry of conferences this browser has seen — drives the quick-switch dropdown.
function rememberConference(d) {
  const id = confIdFor(d);
  const reg = JSON.parse(localStorage.getItem('cs:registry') || '{}');
  reg[id] = { name: confNameFor(d), lastUsed: new Date().toISOString() };
  localStorage.setItem('cs:registry', JSON.stringify(reg));
}

// One-time migration: move legacy flat keys into the current conference namespace.
(function migrateLegacyKeys() {
  const legacySel = localStorage.getItem('cs_selected');
  const legacyNot = localStorage.getItem('cs_notes');
  if (legacySel && !localStorage.getItem(kSelected())) localStorage.setItem(kSelected(), legacySel);
  if (legacyNot && !localStorage.getItem(kNotes()))    localStorage.setItem(kNotes(), legacyNot);
  if (legacySel) localStorage.removeItem('cs_selected');
  if (legacyNot) localStorage.removeItem('cs_notes');
})();

// One-time rename: this conference's id changed from "ibpsa-bs-2026" → "iaqvec-2026".
// Move any data accumulated under the old id to the new namespace if the new one is empty.
(function renameConference() {
  const FROM = 'ibpsa-bs-2026', TO = 'iaqvec-2026';
  if (currentConfId !== TO) return;
  for (const field of ['selected', 'notes']) {
    const oldK = `cs:${FROM}:${field}`, newK = `cs:${TO}:${field}`;
    const v = localStorage.getItem(oldK);
    if (v && !localStorage.getItem(newK)) localStorage.setItem(newK, v);
    if (v) localStorage.removeItem(oldK);
  }
  // Drop the old name from the registry too
  const reg = JSON.parse(localStorage.getItem('cs:registry') || '{}');
  if (reg[FROM]) { delete reg[FROM]; localStorage.setItem('cs:registry', JSON.stringify(reg)); }
})();

// ====== State ======
// Track/building filters use explicit "set contains = visible" semantics. Both sets
// start pre-populated with every value so the user sees everything until they choose
// to narrow. "전체 해제" empties the set → nothing of that dimension shows.
function allTracksOf(d)    { return new Set(d.sessions.map(s => s.track_title)); }
function allBuildingsOf(d) { return new Set(d.sessions.map(s => s.building));    }

const state = {
  selected: new Set(JSON.parse(localStorage.getItem(kSelected()) || '[]')),
  // notes: { "session_id#paper_no": { rating: 0..5, note: "..." } }
  notes: new Map(Object.entries(JSON.parse(localStorage.getItem(kNotes()) || '{}'))),
  search: '',
  dayFilter: 'all',
  tracks:    allTracksOf(DATA),
  buildings: allBuildingsOf(DATA),
  // Active view tab: 'browse' or 'itinerary'. Persists across reloads.
  view: localStorage.getItem('cs:view') || 'browse',
};
rememberConference(DATA);

function setView(v) {
  state.view = v;
  localStorage.setItem('cs:view', v);
  renderView();
}

function renderView() {
  const onBrowse = state.view === 'browse';
  document.getElementById('view-browse').style.display    = onBrowse ? '' : 'none';
  document.getElementById('view-itinerary').style.display = onBrowse ? 'none' : '';
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === state.view);
  });
  document.getElementById('view-badge').textContent = state.selected.size;
  document.getElementById('view-badge').dataset.count = state.selected.size;
}

function saveSelection() {
  localStorage.setItem(kSelected(), JSON.stringify([...state.selected]));
  // Keep the tab badge count in sync after any toggle
  const badge = document.getElementById('view-badge');
  if (badge) { badge.textContent = state.selected.size; badge.dataset.count = state.selected.size; }
}

function saveNotes() {
  localStorage.setItem(kNotes(), JSON.stringify(Object.fromEntries(state.notes)));
}

// Swap to a different conference DATA loaded by the user:
function switchConference(newData) {
  DATA = newData;
  currentConfId = confIdFor(newData);
  state.selected = new Set(JSON.parse(localStorage.getItem(kSelected()) || '[]'));
  state.notes    = new Map(Object.entries(JSON.parse(localStorage.getItem(kNotes()) || '{}')));
  state.tracks    = allTracksOf(newData);
  state.buildings = allBuildingsOf(newData);
  state.dayFilter = 'all'; state.search = '';
  rememberConference(newData);
  renderConfChip();
  renderAll();
}

function getNote(key) {
  return state.notes.get(key) || { rating: 0, note: '' };
}

function setNote(key, patch) {
  const cur = getNote(key);
  const next = { ...cur, ...patch };
  // If both empty, remove the entry to keep storage compact
  if (!next.rating && !next.note) state.notes.delete(key);
  else state.notes.set(key, next);
  saveNotes();
}

// ====== Helpers ======
function timeToMin(t) {
  // PDF uses both "11:00" (24h) and "3:30" (PM, no AM/PM marker).
  // Heuristic: hours < 8 are PM (afternoon) → add 12.
  const [h, m] = t.split(':').map(Number);
  const hh = h < 8 ? h + 12 : h;
  return hh * 60 + m;
}

function sessionFor(paper) { return DATA.sessions.find(s => s.id === paper.session_id); }

// ====== Render: filters ======
// Day count threshold above which we switch from buttons to a select element,
// because 5+ tabs don't fit comfortably in the sidebar.
const DAY_TABS_AS_SELECT = 5;

function renderFilters() {
  // Day filter
  const days = [...new Set(DATA.sessions.map(s => s.day))].sort();
  const dt = document.getElementById('day-tabs');
  dt.innerHTML = '';
  // Strip the year from "5/19/2026" → "5/19" so the tab fits.
  const shortDate = (mdY) => mdY.split('/').slice(0, 2).join('/');

  if (days.length >= DAY_TABS_AS_SELECT) {
    // Compact dropdown for many-day conferences
    const sel = document.createElement('select');
    sel.className = 'day-select';
    const optAll = document.createElement('option');
    optAll.value = 'all'; optAll.textContent = '전체 일정';
    sel.appendChild(optAll);
    days.forEach(d => {
      const s = DATA.sessions.find(x => x.day === d);
      const o = document.createElement('option');
      o.value = String(d);
      o.textContent = `Day ${d} · ${shortDate(s.date)}`;
      sel.appendChild(o);
    });
    sel.value = String(state.dayFilter);
    sel.onchange = () => {
      state.dayFilter = sel.value === 'all' ? 'all' : Number(sel.value);
      renderAll();
    };
    dt.appendChild(sel);
  } else {
    // Tab buttons for short conferences (≤ 4 days)
    const mkBtn = (key, main, sub) => {
      const b = document.createElement('button');
      b.innerHTML = `<span class="d-main">${escapeHtml(main)}</span>` +
                    (sub ? `<span class="d-sub">${escapeHtml(sub)}</span>` : '');
      if (state.dayFilter == key) b.className = 'active';
      b.onclick = () => { state.dayFilter = key; renderAll(); };
      return b;
    };
    dt.appendChild(mkBtn('all', '전체'));
    days.forEach(d => {
      const s = DATA.sessions.find(x => x.day === d);
      dt.appendChild(mkBtn(d, `Day ${d}`, shortDate(s.date)));
    });
  }

  // Tracks
  const tracks = [...new Set(DATA.sessions.map(s => s.track_title))].sort();
  const tf = document.getElementById('track-filter');
  tf.innerHTML = '';
  tracks.forEach(t => {
    const id = 'tr_' + t.replace(/[^a-z0-9]/gi, '_');
    const row = document.createElement('label');
    row.innerHTML = `<input type="checkbox" id="${id}" ${state.tracks.has(t) ? 'checked' : ''}> ${t}`;
    row.querySelector('input').onchange = (e) => {
      if (e.target.checked) state.tracks.add(t);
      else state.tracks.delete(t);
      renderSessions();
    };
    tf.appendChild(row);
  });

  // Buildings
  const blds = [...new Set(DATA.sessions.map(s => s.building))].sort();
  const bf = document.getElementById('building-filter');
  bf.innerHTML = '';
  blds.forEach(b => {
    const row = document.createElement('label');
    row.innerHTML = `<input type="checkbox" ${state.buildings.has(b) ? 'checked' : ''}> ${b}`;
    row.querySelector('input').onchange = (e) => {
      if (e.target.checked) state.buildings.add(b);
      else state.buildings.delete(b);
      renderSessions();
    };
    bf.appendChild(row);
  });

  // 전체 / 해제 toggle links for both track and building filters
  document.querySelectorAll('.filter-toggles a').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      const target = a.dataset.target;  // "tracks" or "buildings"
      const act = a.dataset.act;        // "all" or "none"
      if (target === 'tracks') {
        if (act === 'all') state.tracks = new Set(tracks);
        else state.tracks.clear();
      } else {
        if (act === 'all') state.buildings = new Set(blds);
        else state.buildings.clear();
      }
      renderAll();
    };
  });
}

// ====== Render: session list ======
function renderSessions() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  const q = state.search.toLowerCase();

  // Group sessions by (day, start) for orderly display
  const sorted = [...DATA.sessions].sort((a,b) =>
    (a.day - b.day) || (timeToMin(a.start) - timeToMin(b.start)) || a.id.localeCompare(b.id)
  );

  for (const s of sorted) {
    if (state.dayFilter !== 'all' && s.day != state.dayFilter) continue;
    // Track/building filters: a session must be in BOTH selected sets to show.
    // Empty set = "전체 해제" → nothing of that dimension is included.
    if (!state.tracks.has(s.track_title)) continue;
    if (!state.buildings.has(s.building)) continue;

    const sPapers = DATA.papers.filter(p => p.session_id === s.id);
    // Session-level haystack: id, track, building, room, chair — so user can find
    // "1-3", "Indoor Air Quality", "SGM 101", "Vincenzo Gentile" etc.
    const sessionHay = `${s.id} ${s.track_title} ${s.building} ${s.room} ${s.chair || ''}`.toLowerCase();
    const sessionMatches = q && sessionHay.includes(q);
    const matchingPapers = q
      ? (sessionMatches
          ? sPapers
          : sPapers.filter(p => (p.title + ' ' + p.authors + ' ' + p.paper_no).toLowerCase().includes(q)))
      : sPapers;
    if (q && matchingPapers.length === 0) continue;

    const div = document.createElement('div');
    div.className = 'session';
    const bldgTag = `<span class="building-tag tag-${s.building}">${hi(s.building + ' ' + s.room)}</span>`;
    const chair = s.chair ? `Chair: ${hi(s.chair)}` : '';
    div.innerHTML = `
      <div class="session-header">
        <div>
          <div class="session-id">Session ${hi(s.id)} · Day ${s.day} ${s.start}–${s.end} ${bldgTag}</div>
          <div class="session-title">${hi(s.track_title)}</div>
          <div class="session-meta">${chair}</div>
        </div>
        <button class="toggle-collapse">접기/펴기</button>
      </div>
      <div class="paper-list"></div>
    `;
    div.querySelector('.toggle-collapse').onclick = () => div.classList.toggle('collapsed');

    const pl = div.querySelector('.paper-list');
    if (matchingPapers.length === 0) {
      pl.innerHTML = '<div class="empty">발표 정보 없음</div>';
    }
    for (const p of matchingPapers) {
      const key = p.session_id + '#' + p.paper_no;
      const row = document.createElement('div');
      row.className = 'paper';
      const n = getNote(key);
      const noteBadge = (n.rating || n.note)
        ? `<span class="note-indicator" title="${n.rating?n.rating+'★ ':''}${n.note?'· 메모 있음':''}">${n.rating?'★'.repeat(n.rating):''}${n.note?' 📝':''}</span>`
        : '';
      row.innerHTML = `
        <input type="checkbox" data-key="${key}" ${state.selected.has(key)?'checked':''}>
        <div class="paper-body">
          <div class="paper-title">${hi(p.title)}${noteBadge}</div>
          <div class="paper-authors">${hi(p.authors)} <span class="paper-no">· #${hi(p.paper_no)}${p.is_sponsored?' ⭐':''}</span></div>
        </div>
      `;
      row.querySelector('input').onchange = (e) => {
        if (e.target.checked) state.selected.add(key);
        else state.selected.delete(key);
        saveSelection();
        renderItinerary();
      };
      pl.appendChild(row);
    }
    list.appendChild(div);
  }

  document.getElementById('stats').textContent =
    `${DATA.sessions.length} sessions · ${DATA.papers.length} papers · 선택: ${state.selected.size}`;
}

// ====== Render: itinerary ======
function renderItinerary() {
  const root = document.getElementById('itinerary');
  if (state.selected.size === 0) {
    root.innerHTML = '<div class="empty">발표를 선택하면 여기에 일정과 동선이 표시됩니다.</div>';
    document.getElementById('stats').textContent =
      `${DATA.sessions.length} sessions · ${DATA.papers.length} papers · 선택: 0`;
    return;
  }

  // Build list of {session, paper} for selected items
  const items = [];
  for (const key of state.selected) {
    const [sid, pno] = key.split('#');
    const p = DATA.papers.find(x => x.session_id===sid && x.paper_no===pno);
    if (!p) continue;
    const s = sessionFor(p);
    if (!s) continue;
    items.push({ s, p, key });
  }
  items.sort((a,b) =>
    (a.s.day - b.s.day) || (timeToMin(a.s.start) - timeToMin(b.s.start)) || a.s.id.localeCompare(b.s.id)
  );

  // Group by day
  const byDay = new Map();
  for (const it of items) {
    if (!byDay.has(it.s.day)) byDay.set(it.s.day, []);
    byDay.get(it.s.day).push(it);
  }

  let html = '';
  for (const [day, list] of byDay) {
    const date = list[0].s.date;
    html += `<div class="day-block"><h3>Day ${day} — ${date}</h3>`;

    // Group same time-slot picks together (conflict if room differs)
    const slots = new Map();
    for (const it of list) {
      const tkey = it.s.start + '-' + it.s.end;
      if (!slots.has(tkey)) slots.set(tkey, []);
      slots.get(tkey).push(it);
    }

    // Render a single pick card (reused across rooms in a multi-room slot)
    const renderPick = (it) => {
      const n = getNote(it.key);
      const stars = [1,2,3,4,5].map(v =>
        `<span class="star ${v<=n.rating?'on':''}" data-key="${it.key}" data-val="${v}">★</span>`
      ).join('');
      return `<div class="pick">
        <div class="ptitle">${escapeHtml(it.p.title)}</div>
        <div class="pauthors">${escapeHtml(it.p.authors)}</div>
        <div class="pmeta">${escapeHtml(it.s.track_title)} · #${escapeHtml(it.p.paper_no)}
          <a href="#" data-key="${it.key}" class="rm" style="margin-left:6px;color:#d0021b;">제거</a></div>
        <div class="rating" data-key="${it.key}">${stars}
          <span class="star clear-star" data-key="${it.key}" data-val="0" title="평점 지우기" style="color:#ccc;font-size:13px;margin-left:6px;">✕</span>
        </div>
        <textarea class="note-input" data-key="${it.key}" placeholder="메모..." rows="1">${escapeHtml(n.note)}</textarea>
      </div>`;
    };

    let prev = null;
    for (const [tkey, picks] of [...slots.entries()].sort((a,b) => timeToMin(a[0].split('-')[0]) - timeToMin(b[0].split('-')[0]))) {
      // Walk-time hint between consecutive slots. With multi-room picks, take the
      // first room of the next slot as the destination (user's exact choice unknown).
      if (prev) {
        const gap = timeToMin(picks[0].s.start) - timeToMin(prev.s.end);
        const w = walkMinutes(prev.s, picks[0].s);
        const tight = gap < w;
        html += `<div class="walk ${tight?'tight':''}">↓ 이동 ${prev.s.building} ${prev.s.room} → ${picks[0].s.building} ${picks[0].s.room} · 도보 ~${w}분 · 여유 ${gap}분${tight?'  ⚠️ 시간 부족':''}</div>`;
      }

      // Group same-slot picks by room → render as horizontal columns
      const byRoom = new Map();
      for (const it of picks) {
        const r = `${it.s.building} ${it.s.room}`;
        if (!byRoom.has(r)) byRoom.set(r, []);
        byRoom.get(r).push(it);
      }
      const isMulti = byRoom.size > 1;

      html += `<div class="slot ${isMulti?'multi-room':''}">`;
      html += `<div class="time">${picks[0].s.start}–${picks[0].s.end}${isMulti ? ` · 병행 ${byRoom.size}개 방` : ''}</div>`;
      if (isMulti) {
        html += `<div class="info">↔ 같은 시간대에 ${byRoom.size}개 방을 선택하셨습니다. 한 곳을 정하시거나, 발표 일부씩 들으실 수 있도록 비교해 보세요.</div>`;
      }
      html += `<div class="rooms">`;
      for (const [room, roomPicks] of byRoom) {
        html += `<div class="room-col">
          <div class="room-head"><span>${escapeHtml(room)}</span><span style="font-weight:400;color:#888;">${roomPicks.length}개</span></div>
          ${roomPicks.map(renderPick).join('')}
        </div>`;
      }
      html += `</div></div>`;

      prev = picks[picks.length - 1];
    }
    html += `</div>`;
  }

  root.innerHTML = html;
  root.querySelectorAll('.rm').forEach(a => {
    a.onclick = (e) => {
      e.preventDefault();
      state.selected.delete(a.dataset.key);
      saveSelection();
      renderAll();
    };
  });

  // Star rating click → set/clear rating; only refresh the star group (don't re-render whole panel
  // or the textarea would lose focus while user is typing).
  root.querySelectorAll('.rating .star').forEach(star => {
    star.onclick = () => {
      const key = star.dataset.key;
      const v = parseInt(star.dataset.val, 10);
      setNote(key, { rating: v });
      // Refresh only the parent .rating element
      const group = star.parentElement;
      const newR = getNote(key).rating;
      group.querySelectorAll('.star').forEach(s => {
        const sv = parseInt(s.dataset.val, 10);
        if (s.classList.contains('clear-star')) return;
        s.classList.toggle('on', sv <= newR);
      });
    };
  });

  // Note textarea → debounced auto-save
  root.querySelectorAll('.note-input').forEach(ta => {
    let t = null;
    ta.addEventListener('input', () => {
      clearTimeout(t);
      t = setTimeout(() => {
        setNote(ta.dataset.key, { note: ta.value });
      }, 250);
    });
  });

  document.getElementById('stats').textContent =
    `${DATA.sessions.length} sessions · ${DATA.papers.length} papers · 선택: ${state.selected.size}`;
}

function renderConfChip() {
  const nameEl = document.getElementById('conf-name');
  nameEl.textContent = confNameFor(DATA);
  nameEl.onclick = enterRenameMode;
  document.getElementById('conf-edit').onclick = enterRenameMode;

  // Build dropdown from registry, excluding the current one
  const reg = JSON.parse(localStorage.getItem('cs:registry') || '{}');
  const sel = document.getElementById('conf-switch');
  const others = Object.entries(reg).filter(([id]) => id !== currentConfId);
  if (others.length === 0) {
    sel.style.display = 'none';
  } else {
    sel.style.display = '';
    sel.innerHTML = '<option value="">↕ 이전 학회로 전환</option>' +
      others.map(([id, meta]) => `<option value="${id}">${escapeHtml(meta.name)}</option>`).join('');
    sel.onchange = () => {
      const id = sel.value;
      if (!id) return;
      alert('이 학회의 JSON 파일을 다시 불러와 주세요. 평점·메모는 그대로 보존됩니다.');
      sel.value = '';
    };
  }
}

// Swap conf-name span with an input; commit on blur/Enter, cancel on Escape.
function enterRenameMode() {
  const nameEl = document.getElementById('conf-name');
  const current = nameEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.className = 'conf-rename-input';
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  let done = false;
  const commit = (save) => {
    if (done) return; done = true;
    const newName = input.value.trim();
    if (save && newName && newName !== current) {
      saveNameOverride(currentConfId, newName);
    }
    // Rebuild the chip so its span and handlers are restored
    const span = document.createElement('span');
    span.className = 'conf-name';
    span.id = 'conf-name';
    span.title = '클릭하여 학회명 수정';
    input.replaceWith(span);
    renderConfChip();
  };
  input.addEventListener('blur', () => commit(true));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(true); }
    if (e.key === 'Escape') { e.preventDefault(); commit(false); }
  });
}

function renderAll() {
  renderConfChip();
  renderFilters();
  renderSessions();
  renderItinerary();
  renderView();
}

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Escape regex metacharacters in the user query so e.g. "C++" or "(IEQ)" works.
function escapeRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Returns HTML-safe string with current search query wrapped in <mark>.
// Always run AFTER escapeHtml: input is plain text, output is sanitized HTML.
function hi(s) {
  const safe = escapeHtml(s);
  const q = (state.search || '').trim();
  if (!q) return safe;
  const re = new RegExp('(' + escapeRegExp(q) + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

// ====== Buttons ======
document.getElementById('btn-clear').onclick = () => {
  if (!confirm('선택을 모두 해제할까요?')) return;
  state.selected.clear();
  saveSelection();
  renderAll();
};

// Per RFC 5545: escape backslash, comma, semicolon, and newline in TEXT fields.
function icsEscape(s) {
  return (s || '').replace(/\\/g,'\\\\').replace(/\n/g,'\\n').replace(/,/g,'\\,').replace(/;/g,'\\;');
}

document.getElementById('btn-export-ics').onclick = () => {
  if (state.selected.size === 0) { alert('선택된 발표가 없습니다.'); return; }
  const dateToIso = (mdY) => {
    const [m,d,y] = mdY.split('/');
    return `${y}${m.padStart(2,'0')}${d.padStart(2,'0')}`;
  };
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Conference Planner//KO'];
  for (const key of state.selected) {
    const [sid, pno] = key.split('#');
    const p = DATA.papers.find(x => x.session_id===sid && x.paper_no===pno);
    if (!p) continue;
    const s = sessionFor(p);
    const n = getNote(key);
    const dt = dateToIso(s.date);
    const [sh,sm] = s.start.split(':').map(Number);
    const [eh,em] = s.end.split(':').map(Number);
    const fmt = (h,m) => `${dt}T${String(h<8?h+12:h).padStart(2,'0')}${String(m).padStart(2,'0')}00`;
    // Build description with optional rating + notes
    const descParts = [
      'Authors: ' + p.authors,
      'Session ' + s.id + ' · ' + s.track_title,
    ];
    if (n.rating) descParts.push('Rating: ' + '★'.repeat(n.rating) + '☆'.repeat(5 - n.rating) + ' (' + n.rating + '/5)');
    if (n.note)   descParts.push('Notes: ' + n.note);

    lines.push('BEGIN:VEVENT');
    lines.push('UID:' + key + '@conf-planner');
    lines.push('SUMMARY:' + icsEscape(p.title));
    lines.push('LOCATION:' + icsEscape(s.building + ' ' + s.room));
    lines.push('DESCRIPTION:' + icsEscape(descParts.join('\n')));
    lines.push('DTSTART:' + fmt(sh,sm));
    lines.push('DTEND:'   + fmt(eh,em));
    lines.push('END:VEVENT');
  }
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-conference-schedule.ics';
  a.click();
};

// CSV export: every paper that is selected OR has rating OR has notes.
// RFC 4180 quoting: wrap each field in quotes, escape internal quotes by doubling.
function csvCell(v) {
  const s = String(v ?? '');
  if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

document.getElementById('btn-export-csv').onclick = () => {
  // Collect candidate keys
  const keys = new Set([...state.selected, ...state.notes.keys()]);
  if (keys.size === 0) { alert('내보낼 항목이 없습니다 (선택·평점·메모 중 하나 이상 필요).'); return; }

  const header = ['Day','Date','Start','End','Building','Room','SessionID','Track','PaperNo','Title','Authors','Selected','Rating','Notes'];
  const rows = [header.map(csvCell).join(',')];

  // Sort by day → start → session id
  const items = [];
  for (const key of keys) {
    const [sid, pno] = key.split('#');
    const p = DATA.papers.find(x => x.session_id===sid && x.paper_no===pno);
    if (!p) continue;
    const s = sessionFor(p);
    if (!s) continue;
    items.push({ key, p, s });
  }
  items.sort((a,b) =>
    (a.s.day - b.s.day) ||
    (timeToMin(a.s.start) - timeToMin(b.s.start)) ||
    a.s.id.localeCompare(b.s.id)
  );

  for (const it of items) {
    const n = getNote(it.key);
    rows.push([
      it.s.day, it.s.date, it.s.start, it.s.end,
      it.s.building, it.s.room, it.s.id, it.s.track_title,
      it.p.paper_no, it.p.title, it.p.authors,
      state.selected.has(it.key) ? 'Y' : 'N',
      n.rating || '',
      n.note || '',
    ].map(csvCell).join(','));
  }

  // BOM so Excel opens UTF-8 correctly
  const blob = new Blob(['﻿' + rows.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-conference-notes.csv';
  a.click();
};

// ===== JSON import (auto-detects conference data vs personal state) =====
document.getElementById('btn-load-json').onclick = () => document.getElementById('file-json').click();
document.getElementById('file-json').onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const parsed = JSON.parse(r.result);
      // Distinguish file type by content
      if (parsed.sessions && parsed.papers) {
        // → Conference data file: replace current conference
        switchConference(parsed);
      } else if (parsed.selected || parsed.notes) {
        // → Personal state file: apply to current conference
        applyImportedState(parsed);
      } else {
        alert('인식되지 않는 JSON입니다. sessions/papers 또는 selected/notes 필드가 필요합니다.');
      }
    } catch (err) { alert('JSON 파싱 실패: ' + err.message); }
    finally { e.target.value = ''; }  // allow re-selecting the same file
  };
  r.readAsText(f);
};

function applyImportedState(p) {
  if (p.conference_id && p.conference_id !== currentConfId) {
    if (!confirm(
      `이 데이터는 '${p.conference_id}' 학회의 것이고 현재 학회는 '${currentConfId}' 입니다.\n` +
      `발표 ID가 일치하지 않으면 일부 항목이 무시될 수 있습니다. 그래도 진행할까요?`
    )) return;
  }
  const hasExisting = state.selected.size > 0 || state.notes.size > 0;
  let merge = true;
  if (hasExisting) {
    merge = confirm(
      `현재 ${state.selected.size}개 선택·${state.notes.size}개 메모가 있습니다.\n` +
      `[확인] 합치기  ·  [취소] 덮어쓰기`
    );
  }
  if (!merge) { state.selected.clear(); state.notes.clear(); }
  for (const k of (p.selected || [])) state.selected.add(k);
  for (const [k, v] of Object.entries(p.notes || {})) {
    const cur = state.notes.get(k) || { rating: 0, note: '' };
    state.notes.set(k, { ...cur, ...v });
  }
  saveSelection(); saveNotes();
  renderAll();
  alert(`적용 완료: ${state.selected.size}개 선택, ${state.notes.size}개 메모`);
}

// ===== JSON state export =====
document.getElementById('btn-export-state').onclick = () => {
  if (state.selected.size === 0 && state.notes.size === 0) {
    alert('내보낼 선택이나 메모가 없습니다.'); return;
  }
  const payload = {
    version: 1,
    conference_id: currentConfId,
    conference_name: confNameFor(DATA),
    exported_at: new Date().toISOString(),
    selected: [...state.selected],
    notes: Object.fromEntries(state.notes),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `my-${currentConfId}-state.json`;
  a.click();
};

// ===== URL share link (selection + ratings only; notes excluded due to URL length) =====
// UTF-8 safe URL-friendly base64
function b64UrlEncode(s) {
  const bytes = new TextEncoder().encode(s);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function b64UrlDecode(s) {
  const padded = s.replace(/-/g, '+').replace(/_/g, '/') + '='.repeat((4 - s.length % 4) % 4);
  const bin = atob(padded);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

function buildShareUrl() {
  const ratings = {};
  for (const [k, n] of state.notes) if (n.rating) ratings[k] = n.rating;
  const payload = { c: currentConfId, s: [...state.selected], r: ratings };
  const code = b64UrlEncode(JSON.stringify(payload));
  return location.origin + location.pathname + '#sh=' + code;
}

document.getElementById('btn-share').onclick = () => {
  if (state.selected.size === 0) { alert('공유할 선택이 없습니다. 먼저 발표를 선택해 주세요.'); return; }
  const url = buildShareUrl();
  document.getElementById('share-url').value = url;
  // QR via free public service. If offline, the img onerror handler shows a fallback message.
  const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(url);
  document.getElementById('share-qr').innerHTML =
    `<img alt="QR code" src="${qrSrc}" onerror="this.outerHTML='<div class=&quot;err&quot;>QR 생성 실패 (오프라인일 수 있음) — URL을 복사해 사용하세요.</div>'">`;
  document.getElementById('share-modal').style.display = 'flex';
};
document.getElementById('share-close').onclick = () => {
  document.getElementById('share-modal').style.display = 'none';
};
document.getElementById('share-modal').onclick = (e) => {
  if (e.target.id === 'share-modal') e.currentTarget.style.display = 'none';
};
document.getElementById('share-copy').onclick = () => {
  const inp = document.getElementById('share-url');
  inp.select();
  try {
    navigator.clipboard.writeText(inp.value);
    document.getElementById('share-copy').textContent = '복사됨';
    setTimeout(() => { document.getElementById('share-copy').textContent = '복사'; }, 1500);
  } catch (_) {
    document.execCommand('copy');
  }
};

// ===== Apply share param on boot =====
(function applyShareFromHash() {
  const m = location.hash.match(/sh=([^&]+)/);
  if (!m) return;
  let payload;
  try { payload = JSON.parse(b64UrlDecode(m[1])); }
  catch (e) { alert('공유 링크 파싱 실패: ' + e.message); return; }

  if (payload.c && payload.c !== currentConfId) {
    if (!confirm(
      `공유 링크는 '${payload.c}' 학회의 것이고 현재 학회는 '${currentConfId}' 입니다.\n` +
      `그대로 진행하면 발표 ID가 맞지 않아 일부 항목이 빈자리로 표시될 수 있습니다. 계속할까요?`
    )) { history.replaceState(null, '', location.pathname); return; }
  }
  const hasExisting = state.selected.size > 0 || state.notes.size > 0;
  let merge = true;
  if (hasExisting) {
    merge = confirm(
      `현재 ${state.selected.size}개 선택이 있습니다.\n` +
      `[확인] 합치기  ·  [취소] 덮어쓰기`
    );
  }
  if (!merge) { state.selected.clear(); state.notes.clear(); }
  for (const k of (payload.s || [])) state.selected.add(k);
  for (const [k, r] of Object.entries(payload.r || {})) {
    const cur = state.notes.get(k) || { rating: 0, note: '' };
    state.notes.set(k, { ...cur, rating: r });
  }
  saveSelection(); saveNotes();
  // Clean the URL so refresh doesn't re-apply
  history.replaceState(null, '', location.pathname);
})();

// ====== Search input wiring ======
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', (e) => {
  state.search = e.target.value || '';
  renderSessions();
});

// ====== View-tab wiring ======
document.querySelectorAll('.view-tab').forEach(btn => {
  btn.onclick = () => setView(btn.dataset.view);
});

// ====== Boot ======
renderAll();
</script>
